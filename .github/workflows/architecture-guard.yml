name: Architecture Guard

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  architecture-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate dependency maps
        run: |
          npm run arch:full || true
          npm run arch:circular || true
          npm run arch:modules || true
          npm run arch:heatmap || true

      - name: Check circular dependencies
        run: npm run arch:validate

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: Upload architecture artifacts
        uses: actions/upload-artifact@v4
        with:
          name: architecture-maps
          path: |
            docs/architecture/system-map.svg
            docs/architecture/heatmap-report.md
            docs/architecture/circular-deps.json
          if-no-files-found: ignore

      - name: Comment PR with heatmap
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('docs/architecture/heatmap-report.md')) {
              console.log('Heatmap not found, skipping.');
              return;
            }
            const heatmap = fs.readFileSync('docs/architecture/heatmap-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '## Architecture Guard\n```markdown\n' + heatmap.slice(0, 3000) + '\n...\n```'
            });
